<!DOCTYPE html>
<html>
    <head>
        <title>payment page</title>
        <link rel="stylesheet" href="payment-style.css">
        
    </head>
    <body>
        <div class="container">
            <h2>payment details</h2>
            <div class="row">
                <div class="col">
                    <label>full name</label>
                    <input type="text" placeholder="enter your valid name" required><br>
                    <label>email</label>
                    <input type="email" placeholder="enter your valid email" required><br>
                    <label>address</label>
                    <input type="text" placeholder="enter valid parmanent address" required><br>
                </div>

                <div class="col">
                    <label>full name according to card</label>
                    <input type="text" placeholder="enter your valid card name" required><br>
                    <label>card number</label>
                    <input type="text" placeholder="1111-2222-3333-4444" required><br>
                    <label> card expiry date</label>
                    <input type="date" placeholder="card expiry date" required><br>
                </div>
            </div>
            <button class="btn">proceed to payment</button>
                
            </div>
        </div>
    </body>
    
</html>
